<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up page</title>
    <link rel="stylesheet" href="./CSS/all.min.css">
    <link rel="stylesheet" href="./CSS/bootstrap.min.css">
    <link rel="stylesheet" href="./CSS/style.css">
</head>
<body>
    
    <div class="container py-5 mt-5 ">
        <h1 class="text-center mb-3">Smart Login System</h1>


        <input type="text" class="form-control name"  placeholder="Enter your name">
    
       <p id="checkName" class="text-white"></p>

        <input type="email" class="form-control signUpMail" placeholder="Enter your email">
      
<p id="checkMail" class="text-white"></p>
        <input type="password" class="form-control signUpPass"  placeholder="Enter password">
<p id="checkSignPass" class="text-white"></p>


        <p id="allSignInputs" class="text-primary text-center fs-2 "></p>
<button class="btn btn-info mt-3 w-100 signUpBtn">Sign Up</button>
<p class="text-white text-center mt-3 fs-2">You have an account? <span id="signIn">Sign in</span>


</div>













<script src="./Js/bootstrap.bundle.min.js"></script>
<script src="./signup.js"></script>
</body>
</html>
