<div class="container py-5 mt-5 ">

        <input type="email" class="form-control email"  placeholder="Email">

<p id="allInputs" class="text-danger text-center fs-2"> </p>
<button class="btn btn-primary w-100 mt-4 text-white fs-3 login"> login</button>
